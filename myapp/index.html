<!DOCTYPE html>\n<html lang="en">\n

<head>\n
    <meta charset="UTF-8">\n
    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n <title>Calculator</title>\n
    <link rel="stylesheet" href="style.css">\n
</head>\n

<body>\n <div class="calculator">\n <input type="text" id="display" readonly>\n <div class="buttons">\n <button
                onclick="clearDisplay()">C</button>\n <button onclick="append('/')">/</button>\n <button
                onclick="append('')"></button>\n <button onclick="del()">⌫</button>\n\n <button
                onclick="append('7')">7</button>\n <button onclick="append('8')">8</button>\n <button
                onclick="append('9')">9</button>\n <button onclick="append('-')">-</button>\n\n <button
                onclick="append('4')">4</button>\n <button onclick="append('5')">5</button>\n <button
                onclick="append('6')">6</button>\n <button onclick="append('+')">+</button>\n\n <button
                onclick="append('1')">1</button>\n <button onclick="append('2')">2</button>\n <button
                onclick="append('3')">3</button>\n <button class="equal" onclick="calculate()"
                rowspan="2">=</button>\n\n <button class="zero" onclick="append('0')">0</button>\n <button
                onclick="append('.')">.</button>\n </div>\n </div>\n
    <script src="script.js"></script>\n
</body>\n

</html>
